<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Disease Prediction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#ffffff;
    width:100%;
    max-width:900px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#0f172a;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
}

input:focus,select:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#dc2626;
}

.note{
    margin-top:15px;
    color:#64748b;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Heart Disease Prediction System</h1>

<form action="/predict" method="POST">

<div class="form-grid">

<input type="number" name="age" placeholder="Age" required>

<select name="sex" required>
<option value="">Gender</option>
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<select name="cp" required>
<option value="">Chest Pain Type</option>
<option value="0">Typical Angina</option>
<option value="1">Atypical Angina</option>
<option value="2">Non-anginal Pain</option>
<option value="3">Asymptomatic</option>
</select>

<input type="number" name="trestbps" placeholder="Resting Blood Pressure" required>

<input type="number" name="chol" placeholder="Cholesterol mg/dl" required>

<select name="fbs" required>
<option value="">Fasting Blood Sugar > 120</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<select name="restecg" required>
<option value="">Rest ECG</option>
<option value="0">Normal</option>
<option value="1">ST-T Wave Abnormality</option>
<option value="2">Left Ventricular Hypertrophy</option>
</select>

<input type="number" name="thalach" placeholder="Max Heart Rate" required>

<select name="exang" required>
<option value="">Exercise Angina</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required>

<select name="slope" required>
<option value="">Slope</option>
<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>
</select>

<input type="number" name="ca" placeholder="Major Vessels (0-4)" required>

<select name="thal" required>
<option value="">Thalassemia</option>
<option value="0">Normal</option>
<option value="1">Fixed Defect</option>
<option value="2">Reversible Defect</option>
<option value="3">Unknown</option>
</select>

</div>

<button type="submit">Predict</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

<div class="note">
Dataset Fields: age, sex, cp, trestbps, chol, fbs, restecg, thalach, exang, oldpeak, slope, ca, thal
</div>

</div>

</body>
</html>
